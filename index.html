<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Gerador de senhas</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <section class="container">
    <h1>GERADOR DE SENHA</h1>
    <div class="resultado">Selecione as opções</div>
    <div class="dica">DICA: CLIQUE PARA COPIAR</div>

    <label for="caracteres">Quantidade de caracteres: </label><input type="number" class="quantidade-caracteres"><br>
    <label>* Adicionar números</label><input type="checkbox" class="numeros"><br>
    <label>* Letras maiúsculas </label><input type="checkbox" class="letras-maiusculas"><br>
    <label>* Letras minúsculas </label><input type="checkbox" class="letras-minusculas"><br>
    <label>* Adicionar simbolos</label><input type="checkbox" class="simbolos"><br>

    <button class="gerar">Gerar senha</button>

    <script src="index.js"></script>
  </section>


</body>

</html>
