<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Gerador de Senhas</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <main class="container">
    <h1>Gerador de Senha</h1>
    
    <div class="resultado-container">
      <div class="resultado">Selecione as opções</div>
      <div class="dica">👆 DICA: CLIQUE PARA COPIAR</div>
    </div>

    <div class="opcoes-container">
      <div class="form-group">
        <label for="caracteres">Quantidade de caracteres:</label>
        <input type="number" id="caracteres" class="quantidade-caracteres" value="12" min="4" max="50">
      </div>
      
      <div class="form-group">
        <label for="num">Adicionar números</label>
        <input type="checkbox" id="num" class="numeros" checked>
      </div>
      
      <div class="form-group">
        <label for="mai">Letras maiúsculas</label>
        <input type="checkbox" id="mai" class="letras-maiusculas" checked>
      </div>
      
      <div class="form-group">
        <label for="min">Letras minúsculas</label>
        <input type="checkbox" id="min" class="letras-minusculas" checked>
      </div>
      
      <div class="form-group">
        <label for="sim">Adicionar símbolos</label>
        <input type="checkbox" id="sim" class="simbolos">
      </div>
    </div>

    <button class="gerar">Gerar Senha</button>
  </main>

  <script src="./assets/js/index.js"></script>
</body>

</html>
