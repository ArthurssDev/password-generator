<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Senha</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="fundo-tela">
    <main class="container-principal">
      <h1 class="titulo">Gerador de Senha</h1>

      <div class="caixa-resultado">
        <div class="resultado">Selecione as opções</div>
        <p class="dica">👆 DICA: CLIQUE PARA COPIAR</p>
      </div>

      <div class="opcoes-painel">
        <div class="grupo-controle">
          <label>Quantidade de caracteres:</label>
          <input type="number" class="quantidade-caracteres" value="12" min="4" max="50">
        </div>

        <div class="grupo-controle">
          <label>Adicionar números</label>
          <input type="checkbox" class="numeros" checked>
        </div>

        <div class="grupo-controle">
          <label>Letras maiúsculas</label>
          <input type="checkbox" class="letras-maiusculas" checked>
        </div>

        <div class="grupo-controle">
          <label>Letras minúsculas</label>
          <input type="checkbox" class="letras-minusculas" checked>
        </div>

        <div class="grupo-controle">
          <label>Adicionar símbolos</label>
          <input type="checkbox" class="simbolos">
        </div>
      </div>

      <button class="gerar">Gerar Senha</button>
    </main>
  </div>
  <script src="assets/js/index.js"></script>
</body>

</html>
